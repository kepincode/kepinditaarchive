<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kepindanditaarvchive.com</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .error-msg { color: red; font-size: 12px; margin-bottom: 10px; height: 15px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        
        /* Gallery Styles */
        #gallery-page, #view-page { display: none; max-width: 800px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .img-card { position: relative; border-radius: 8px; overflow: hidden; height: 150px; background: #eee; }
        .img-card img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        
        /* Preview Styles */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #overlay img { max-width: 90%; max-height: 80%; border-radius: 8px; }
        .controls { margin-bottom: 20px; display: flex; gap: 20px; }
        .btn-icon { padding: 8px 15px; border-radius: 5px; cursor: pointer; border: none; font-size: 14px; }
        .btn-save { background: #28a745; color: white; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-page" class="container">
        <div id="error-box" class="error-msg"></div>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Kata Sandi">
        <button onclick="checkLogin()">MASUK</button>
    </div>

    <div id="gallery-page" class="container">
        <h2>Simpan Kenangan</h2>
        <div id="upload-error" class="error-msg"></div>
        <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
        <button onclick="document.getElementById('fileInput').click()" style="background: #6c757d;">Pilih Foto</button>
        <button onclick="goToView()" style="margin-top: 10px;">Lanjut ke Galeri</button>
    </div>

    <div id="view-page" class="container" style="max-width: 600px;">
        <h2>Arsip Foto</h2>
        <button onclick="backToUpload()" style="background: #6c757d; margin-bottom: 10px;">Tambah Lagi</button>
        <div id="imageGrid" class="grid"></div>
    </div>

    <div id="overlay">
        <span class="btn-close" onclick="closePreview()">&times;</span>
        <div class="controls">
            <button id="saveBtn" class="btn-icon btn-save">Save Image</button>
            <button id="delBtn" class="btn-icon btn-delete">🗑️</button>
        </div>
        <img id="fullImg">
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('myArchive')) || [];

        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorBox = document.getElementById('error-box');

            if (user !== "kepin") {
                errorBox.innerText = "kepin!!!!!";
            } else if (pass !== "21062009") {
                errorBox.innerText = "tanggal lahirnya kepin masa ga tau si";
            } else {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('gallery-page').style.display = 'block';
            }
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = e.target.files;
            const uploadError = document.getElementById('upload-error');
            
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const imgData = event.target.result;
                    
                    // Cek duplikasi (berdasarkan konten gambar)
                    if (db.includes(imgData)) {
                        uploadError.innerText = "WOI GAMBARNYA PAKE YANG LAIN NGAPA";
                    } else {
                        uploadError.innerText = "";
                        db.push(imgData);
                        localStorage.setItem('myArchive', JSON.stringify(db));
                    }
                };
                reader.readAsDataURL(file);
            }
            alert("Foto berhasil diproses!");
        });

        function goToView() {
            document.getElementById('gallery-page').style.display = 'none';
            document.getElementById('view-page').style.display = 'block';
            renderGallery();
        }

        function backToUpload() {
            document.getElementById('view-page').style.display = 'none';
            document.getElementById('gallery-page').style.display = 'block';
        }

        function renderGallery() {
            const grid = document.getElementById('imageGrid');
            grid.innerHTML = '';
            db.forEach((src, index) => {
                const div = document.createElement('div');
                div.className = 'img-card';
                div.innerHTML = `<img src="${src}" onclick="openPreview(${index})">`;
                grid.appendChild(div);
            });
        }

        let currentIndex = null;
        function openPreview(index) {
            currentIndex = index;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('fullImg').src = db[index];
            
            document.getElementById('saveBtn').onclick = () => {
                const link = document.createElement('a');
                link.href = db[index];
                link.download = `archive_photo_${index}.png`;
                link.click();
            };

            document.getElementById('delBtn').onclick = () => {
                db.splice(index, 1);
                localStorage.setItem('myArchive', JSON.stringify(db));
                closePreview();
                renderGallery();
            };
        }

        function closePreview() {
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
